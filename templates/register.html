<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskIt — Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">Task<span>It</span></div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Start organizing your tasks today</p>

    <p class="error-msg" id="errorMsg"></p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password"/>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password"/>
    </div>

    <button class="btn-primary" id="registerBtn">Create Account</button>

    <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
  </div>

  <script>
    const registerBtn = document.getElementById('registerBtn');
    const errorMsg    = document.getElementById('errorMsg');

    registerBtn.addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (!email || !password || !confirm) {
        errorMsg.textContent = 'Please fill in all fields.';
        return;
      }

      registerBtn.textContent = 'Creating account...';
      registerBtn.disabled = true;

      const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, confirm })
      });

      const data = await res.json();

      if (res.ok) {
        // Account created — redirect to login
        window.location.href = '/login';
      } else {
        errorMsg.textContent = data.error;
        registerBtn.textContent = 'Create Account';
        registerBtn.disabled = false;
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') registerBtn.click();
    });
  </script>
</body>
</html>
